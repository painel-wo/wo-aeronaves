<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel WO — Pernoite</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.page{max-width:1800px;margin:0 auto;padding:1.25rem}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:1rem}
.header-left h1{font-size:22px;font-weight:500;color:#f8fafc}
.header-left p{font-size:12px;color:#475569;margin-top:3px}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.conn{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8;background:#1e293b;padding:6px 14px;border-radius:20px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#10b981}
.conn-dot.on{animation:blink 2s infinite}
.conn-dot.off{background:#ef4444;animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* KPIS */
.kpis{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:1rem}
.kpi{background:#1e293b;border-radius:10px;padding:10px 14px;border:0.5px solid #334155}
.kpi-n{font-size:22px;font-weight:500;color:#f8fafc;line-height:1}
.kpi-l{font-size:10px;color:#64748b;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.kpi.red .kpi-n{color:#f87171}
.kpi.red{border-color:#450a0a}
.kpi.orange .kpi-n{color:#fcd34d}
.kpi.orange{border-color:#422006}
.kpi.blue .kpi-n{color:#60a5fa}
.kpi.blue{border-color:#1e3a5f}

/* SUMMARY */
.summary{display:flex;gap:1.5rem;margin-bottom:1.25rem;padding:10px 16px;background:#1e293b;border-radius:8px;border:0.5px solid #334155;flex-wrap:wrap}
.sum-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#94a3b8}
.sum-dot{width:8px;height:8px;border-radius:50%}

/* CONTROLS */
.controls{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:8px;border:0.5px solid #334155;background:#1e293b;color:#94a3b8;font-size:13px;cursor:pointer;font-weight:500}
.btn:hover{background:#263348;color:#e2e8f0}
.btn.primary{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.btn.danger{background:#450a0a;border-color:#7f1d1d;color:#fca5a5}
#fileInput{display:none}

/* TABLE */
.tbl-wrap{background:#1e293b;border-radius:12px;border:0.5px solid #334155;overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.6px;padding:7px 10px;text-align:left;font-weight:500;border-bottom:0.5px solid #334155;background:#162032}
.tbl td{padding:5px 10px;border-bottom:0.5px solid #1e293b;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}

/* LINHA AERONAVE */
.ac-row{cursor:pointer;transition:background .1s}
.ac-row:hover td{background:#162032}
.ac-row.finding td{background:#1a0a0a}
.ac-row.finding:hover td{background:#200d0d}
.arrow{font-size:10px;color:#475569;display:inline-block;transition:transform .25s;margin-right:6px}
.arrow.open{transform:rotate(90deg)}
.ac-code{font-weight:500;font-size:13px;color:#93c5fd;letter-spacing:.5px}
.ac-tech{font-size:10px;color:#64748b}
.wo-count{font-size:11px;color:#94a3b8}
.wo-list{font-size:10px;color:#64748b;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-cell{display:flex;align-items:center;gap:6px}
.prog-bar{width:55px;height:4px;background:#0f172a;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#10b981;transition:width .4s}
.prog-txt{font-size:10px;color:#94a3b8;min-width:28px;font-variant-numeric:tabular-nums}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;white-space:nowrap}
.b-done{background:#052e16;color:#4ade80}
.b-started{background:#422006;color:#fbbf24}
.b-pending{background:#1e293b;color:#475569;border:0.5px solid #334155}
.b-finding{background:#450a0a;color:#f87171;animation:blink 1.5s infinite;border:0.5px solid #7f1d1d}
.b-obs{background:#1e3a5f;color:#60a5fa;border:0.5px solid #1e3a8a}
.b-deferred{background:#422006;color:#fcd34d;border:0.5px solid #92400e}
.b-iio{background:#3b0764;color:#d8b4fe;animation:blink 1.5s infinite;border:0.5px solid #6b21a8}
.b-runap{background:#164e63;color:#a5f3fc;animation:blink 1.5s infinite;border:0.5px solid #0e7490}
.mtl{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:500}
.mtl-ok{background:#052e16;color:#4ade80}
.mtl-nhe{background:#422006;color:#fbbf24}
.mtl-tst{background:#3b0764;color:#d8b4fe}
.mtl-nd{background:#1e293b;color:#334155;border:0.5px solid #334155}

/* DETALHE */
.detail-row td{padding:0;border-bottom:0.5px solid #334155}
.detail-inner{padding:0 14px 0 36px}
.task-item{border-bottom:0.5px solid #1e293b;padding:10px 0}
.task-item:last-child{border-bottom:none}
.task-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.task-wo-num{font-size:12px;font-weight:500;color:#e2e8f0}
.task-desc{font-size:11px;color:#64748b;margin-bottom:8px;line-height:1.4}
.finding-item{font-size:11px;padding:3px 0}
.finding-item.open{color:#f87171}
.finding-item.resolved{color:#4ade80}

/* OBSERVAÇÕES */
.obs-area{margin-top:6px}
.obs-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.obs-list{display:flex;flex-direction:column;gap:5px;padding:4px 0}
.obs-bubble-tv{display:flex;flex-direction:column;max-width:90%}
.obs-bubble-tv.tec{align-self:flex-end;align-items:flex-end}
.obs-bubble-tv.lider{align-self:flex-start;align-items:flex-start}
.obs-bubble-tv .obs-author{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}
.obs-bubble-tv .obs-msg{padding:4px 9px;border-radius:10px;font-size:11px;line-height:1.4}
.obs-bubble-tv.tec .obs-msg{background:#1e3a5f;color:#93c5fd;border-bottom-right-radius:2px}
.obs-bubble-tv.lider .obs-msg{background:#1e293b;color:#e2e8f0;border-bottom-left-radius:2px}
.obs-bubble-tv .obs-time-small{font-size:9px;color:#334155;margin-top:1px;font-variant-numeric:tabular-nums}

/* INPUT OBSERVAÇÃO DO LÍDER */
.obs-input-wrap{display:flex;gap:6px;margin-top:8px}
.obs-input{flex:1;padding:7px 10px;background:#0f172a;border:0.5px solid #334155;border-radius:7px;color:#e2e8f0;font-size:12px;font-family:inherit}
.obs-input:focus{outline:none;border-color:#3b82f6}
.obs-send{padding:7px 14px;background:#1d4ed8;border:none;border-radius:7px;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
.obs-send:hover{background:#2563eb}
.obs-empty{font-size:11px;color:#334155;padding:4px 0}

/* FOOTER */
.tbl-footer{padding:8px 14px;font-size:11px;color:#334155;text-align:right;border-top:0.5px solid #334155}

/* LOADING */
.loading{text-align:center;padding:4rem;color:#475569}
.spinner{width:32px;height:32px;border:2px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:4rem;color:#475569}

@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}}

</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-left">
      <h1>✈ Painel WO — Pernoite</h1>
      <p>Clique em uma aeronave para expandir • Sincronizado em tempo real</p>
    </div>
    <div class="header-right">
      <div class="controls">
        <button class="btn primary" onclick="document.getElementById('fileInput').click()">📥 Importar</button>
        <button class="btn" onclick="exportar()">📤 Exportar</button>
        <button class="btn" onclick="window.open('historico.html','_blank')" style="background:#1e293b;border-color:#334155">📋 Histórico</button>
        <button class="btn" id="btn-som" onclick="toggleSom()" style="background:#1e293b;border-color:#334155">🔔 Som ON</button>
        <button class="btn" onclick="encerrarTurno()" style="background:#422006;border-color:#92400e;color:#fbbf24">⏹ Encerrar Turno</button>
        <button class="btn danger" onclick="limpar()">🗑 Limpar</button>
      </div>
      <div class="conn">
        <div class="conn-dot off" id="cdot"></div>
        <span id="clabel">Conectando...</span>
      </div>
    </div>
  </div>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.pdf" onchange="importar(event)">

  <div class="kpis">
    <div class="kpi"><div class="kpi-n" id="k-ac">—</div><div class="kpi-l">Aeronaves</div></div>
    <div class="kpi"><div class="kpi-n" id="k-wo">—</div><div class="kpi-l">WOs</div></div>
    <div class="kpi"><div class="kpi-n" id="k-total">—</div><div class="kpi-l">Tarefas</div></div>
    <div class="kpi"><div class="kpi-n" id="k-done">—</div><div class="kpi-l">Concluídas</div></div>
    <div class="kpi blue"><div class="kpi-n" id="k-obs">—</div><div class="kpi-l">Obs</div></div>
    <div class="kpi red"><div class="kpi-n" id="k-find">—</div><div class="kpi-l">Findings</div></div>
    <div class="kpi orange"><div class="kpi-n" id="k-defer">—</div><div class="kpi-l">Deferidas</div></div>
    <div class="kpi"><div class="kpi-n" id="k-pct">—</div><div class="kpi-l">Progresso</div></div>
  </div>

  <div class="summary">
    <div class="sum-item"><div class="sum-dot" style="background:#10b981"></div><span id="s-done">—</span></div>
    <div class="sum-item"><div class="sum-dot" style="background:#fbbf24"></div><span id="s-and">—</span></div>
    <div class="sum-item"><div class="sum-dot" style="background:#475569"></div><span id="s-pend">—</span></div>
    <div class="sum-item"><div class="sum-dot" style="background:#f87171"></div><span id="s-find">—</span></div>
  </div>

  <div class="tbl-wrap">
    <table class="tbl">
      <thead>
        <tr>
          <th style="min-width:130px">Aeronave</th>
          <th>Equipe</th>
          <th>WO</th>
          <th>Status Tarefas</th>
          <th style="min-width:120px">Progresso</th>
          <th>MTL</th>
          <th>Status WO</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7"><div class="loading"><div class="spinner"></div><p>Conectando...</p></div></td></tr>
      </tbody>
    </table>
    <div class="tbl-footer" id="footer">—</div>
  </div>
</div>

<script>
const URL_='https://owyohcqjyiqhabonnstq.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93eW9oY3FqeWlxaGFib25uc3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjMxMzksImV4cCI6MjA5MzczOTEzOX0.nRpYEt7bZdJXCCyVKM5wZQOdo1DOH8oQIEu_swRizIA';
const sb=window.supabase.createClient(URL_,KEY);

// Estado dos painéis abertos
const openPanels = new Set();

function agora(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}

async function load(){
  try{
    const{data,error}=await sb.from('aircrafts')
      .select('*,tasks(*,findings(*),observations(*))')
      .order('code');
    if(error)throw error;
    // Ignorar aeronaves sem nenhuma tarefa
    const filtrado=(data||[]).filter(ac=>(ac.tasks||[]).length>0);
    render(filtrado);
    setConn(true);
  }catch(e){
    setConn(false);
    document.getElementById('tbody').innerHTML=
      `<tr><td colspan="7"><div class="empty">❌ Erro: ${e.message}</div></td></tr>`;
  }
}

function render(data){
  const tbody=document.getElementById('tbody');
  if(!data.length){
    tbody.innerHTML=`<tr><td colspan="7"><div class="empty">📋 Nenhuma WO carregada.<br>Importe uma planilha Excel para começar.</div></td></tr>`;
    stats(0,0,0,0,0,0,0,0);return;
  }

  let tAC=data.length,tWO=0,dWO=0,sWO=0,fAC=0,tWOunicas=0,tDef=0,tObs=0;

  const html=data.map(ac=>{
    const tasks=ac.tasks||[];
    const done=tasks.filter(t=>t.completed).length;
    const deferred=tasks.filter(t=>t.deferred).length;
    const started=tasks.filter(t=>t.started&&!t.completed&&!t.deferred).length;
    const hasFind=tasks.some(t=>t.has_finding||(t.findings||[]).some(f=>!f.resolved));
    tWO+=tasks.length; dWO+=done; sWO+=started; tDef+=deferred;
    tObs+=tasks.filter(t=>(t.observations||[]).length>0).length;
    if(hasFind)fAC++;

    const pct=tasks.length?Math.round((done+deferred)/tasks.length*100):0;
    // WOs únicas (sem repetição)
    const wosUnicas=[...new Set(tasks.map(t=>t.wo_number))];
    tWOunicas+=wosUnicas.length;
    const woNames=wosUnicas.join(' · ');

    const mo=['TST','NHE','OK',null];
    const mv=tasks.map(t=>t.material);
    let mb=null; for(const m of mo){if(mv.includes(m)){mb=m;break;}}
    const mh=mb==='OK'?`<span class="mtl mtl-ok">OK</span>`:mb==='NHE'?`<span class="mtl mtl-nhe">NHE</span>`:mb==='TST'?`<span class="mtl mtl-tst">TST</span>`:`<span class="mtl mtl-nd">—</span>`;

    const acIIO   = tasks.some(t=>t.has_iio);
    const acRunap = tasks.some(t=>t.has_runap);

    let sh;
    if(hasFind) sh=`<span class="badge b-finding">⚠ Finding!</span>`;
    else if(acIIO)   sh=`<span class="badge b-iio">🔍 IIO!</span>`;
    else if(acRunap) sh=`<span class="badge b-runap">✈ Run-up!</span>`;
    else if(pct===100)sh=`<span class="badge b-done">✓ Concluída</span>`;
    else if(started>0||done>0)sh=`<span class="badge b-started">▶ Andamento</span>`;
    else sh=`<span class="badge b-pending">Aguardando</span>`;

    const isOpen=openPanels.has(ac.id);

    // ---- DETALHE DAS TASKS ----
    // Agrupar tarefas por WO number
    const woGrupos={};
    tasks.forEach(task=>{
      if(!woGrupos[task.wo_number]) woGrupos[task.wo_number]=[];
      woGrupos[task.wo_number].push(task);
    });

    const detailHtml=Object.entries(woGrupos).map(([woNum, woTasks])=>{
      // Status geral do grupo: concluído só se todas concluídas
      const todoConcluido=woTasks.every(t=>t.completed||t.deferred);
      const algumDeferido=woTasks.some(t=>t.deferred);
      const algumFind=woTasks.some(t=>t.has_finding||(t.findings||[]).some(f=>!f.resolved));
      const algumStarted=woTasks.some(t=>t.started&&!t.completed&&!t.deferred);
      const woIIO=woTasks.some(t=>t.has_iio);
      const woRunap=woTasks.some(t=>t.has_runap);
      const doneCnt=woTasks.filter(t=>t.completed).length;
      const defCnt=woTasks.filter(t=>t.deferred).length;

      const woSt=todoConcluido
        ?(algumDeferido
          ?`<span class="badge b-deferred" style="font-size:9px;padding:2px 7px">⏸ Encerrada c/ deferimento</span>`
          :`<span class="badge b-done" style="font-size:9px;padding:2px 7px">✓ Concluída</span>`)
        :algumFind?`<span class="badge b-finding" style="font-size:9px;padding:2px 7px;animation:none">⚠ Finding</span>`
        :algumStarted?`<span class="badge b-started" style="font-size:9px;padding:2px 7px">▶ Andamento</span>`
        :`<span class="badge b-pending" style="font-size:9px;padding:2px 7px">Aguardando</span>`;

      const iioTag  = woIIO  ? `<span class="badge b-iio"  style="font-size:9px;padding:2px 7px">🔍 IIO</span>`  : '';
      const runapTag= woRunap? `<span class="badge b-runap" style="font-size:9px;padding:2px 7px">✈ Run-up</span>` : '';

      // Listar cada sub-tarefa com obs
      const subTarefas=woTasks.map(task=>{
        const obs=(task.observations||[]).sort((a,b)=>(a.recorded_at||'').localeCompare(b.recorded_at||''));
        const finds=(task.findings||[]);
        const tDone=task.completed;
        const tDef=task.deferred;
        const tFind=task.has_finding||(finds).some(f=>!f.resolved);
        const tMtl=task.material;
        const tMb=tMtl==='OK'?`<span class="mtl mtl-ok" style="font-size:9px">OK</span>`:tMtl==='NHE'?`<span class="mtl mtl-nhe" style="font-size:9px">NHE</span>`:tMtl==='TST'?`<span class="mtl mtl-tst" style="font-size:9px">TST</span>`:'';
        const tSt=tDone?`<span style="font-size:9px;color:#4ade80">✓</span>`:tDef?`<span style="font-size:9px;color:#fcd34d" title="${task.defer_reason||''}">⏸</span>`:tFind?`<span style="font-size:9px;color:#f87171">⚠</span>`:task.started?`<span style="font-size:9px;color:#fbbf24">▶</span>`:`<span style="font-size:9px;color:#475569">○</span>`;
        const borderCol=tDone?'#10b981':tDef?'#d97706':tFind?'#f87171':'#334155';
        const findHtml=finds.map(f=>`<div class="finding-item ${f.resolved?'resolved':'open'}">${f.resolved?'✓':'⚠'} ${f.description||''}</div>`).join('');
        const obsHtml=obs.length?obs.map(o=>{
          const isLider=(o.author||'').toLowerCase().includes('líder')||(o.text||'').startsWith('[Líder]');
          const cls=isLider?'lider':'tec';
          const autor=isLider?'Líder':'Técnico';
          const texto=(o.text||'').replace(/^\[Líder\]\s*/,'').replace(/^\[Finding\]\s*/,'⚠ ').replace(/^\[Deferida\]\s*/,'⏸ ');
          return `<div class="obs-bubble-tv ${cls}"><div class="obs-author">${autor}</div><div class="obs-msg">${texto}</div><div class="obs-time-small">${o.recorded_at||'--:--'}</div></div>`;
        }).join(''):`<div class="obs-empty">Sem mensagens</div>`;
        return `<div style="padding:8px 0 8px 12px;border-left:2px solid ${borderCol};margin:6px 0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
              ${tSt}
              ${task.task_code?`<span style="font-size:9px;color:#60a5fa;font-weight:500;background:#1e3a5f;padding:1px 5px;border-radius:4px">${task.task_code}</span>`:''}
              <span style="font-size:10px;color:#94a3b8">${task.description||'—'}</span> ${tMb}
              ${tDef?`<span style="font-size:9px;color:#fcd34d">⏸ ${task.defer_reason||''}</span>`:''}
            </div>
          ${findHtml?`<div style="margin-bottom:4px">${findHtml}</div>`:''}
          <div class="obs-area">
            <div class="obs-label">Observações</div>
            <div class="obs-list">${obsHtml}</div>
            <div class="obs-input-wrap">
              <input class="obs-input" id="obs-inp-${task.id}" placeholder="Líder: adicionar observação..."
                onkeydown="if(event.key==='Enter')enviarObs('${task.id}')"/>
              <button class="obs-send" onclick="enviarObs('${task.id}')">Enviar</button>
            </div>
          </div>
        </div>`;
      }).join('');

      return `<div class="task-item" style="background:${algumFind?'#180808':'transparent'}">
        <div class="task-header">
          <span class="task-wo-num">WO ${woNum}</span>
          ${woSt}${iioTag}${runapTag}
          <span style="font-size:10px;color:#475569">${doneCnt}/${woTasks.length} tarefa${woTasks.length!==1?'s':''}</span>
        </div>
        ${subTarefas}
      </div>`;
    }).join('');



    const acObs=tasks.filter(t=>(t.observations||[]).length>0).length;

    return `
    <tr class="ac-row ${hasFind?'finding':''}" onclick="toggleDetail('${ac.id}')">
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="arrow ${isOpen?'open':''}" id="arrow-${ac.id}">▶</span>
          <span class="ac-code">${ac.code}</span>
          ${acObs?`<span class="badge b-obs" style="font-size:9px;padding:2px 6px">💬 ${acObs}</span>`:''}
        </div>
      </td>
      <td><span class="ac-tech">🪪 ${ac.technician||'—'}</span></td>
      <td><div class="wo-list" title="${woNames}">${woNames||'—'}</div></td>
      <td><span class="wo-count">${done}/${tasks.length}</span></td>
      <td>
        <div class="prog-cell">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="prog-txt">${pct}%</div>
        </div>
      </td>
      <td>${mh}</td>
      <td>${sh}</td>
    </tr>

      <td colspan="7">
        <div class="detail-inner">${detailHtml}</div>
      </td>
    </tr>`;
  }).join('');

  tbody.innerHTML=html;
  verificarNovosFindings(data);

  document.getElementById('footer').textContent=`⏰ Atualizado em ${new Date().toLocaleTimeString('pt-BR')}`;
  ajustarEscala(data.length);
}

function ajustarEscala(numAero){
  // Altura disponível descontando header, kpis, summary e footer
  const alturaTotal = window.innerHeight;
  const alturaFixa  = 280; // header + kpis + summary + padding
  const alturaTabela = alturaTotal - alturaFixa;

  // Calcular altura ideal por linha
  const minAltura = 52;  // mínimo confortável
  const maxAltura = 160; // máximo para não ficar gigante
  const ideal = numAero > 0 ? Math.floor(alturaTabela / numAero) : minAltura;
  const alturaPorLinha = Math.min(maxAltura, Math.max(minAltura, ideal));

  // Calcular tamanho de fonte proporcional
  const escala = alturaPorLinha / 52; // razão em relação ao tamanho base
  const fontCodigo  = Math.min(20, Math.max(12, Math.round(14 * escala))) + 'px';
  const fontTecnico = Math.min(14, Math.max(10, Math.round(11 * escala))) + 'px';
  const fontWo      = Math.min(16, Math.max(10, Math.round(12 * escala))) + 'px';
  const fontPct     = Math.min(14, Math.max(10, Math.round(11 * escala))) + 'px';
  const barraLarg   = Math.min(140, Math.max(60, Math.round(70 * escala))) + 'px';
  const barraAlt    = Math.min(8,   Math.max(4,  Math.round(4  * escala))) + 'px';
  const paddCell    = Math.min(18, Math.max(7,   Math.round(9  * escala))) + 'px 14px';

  // Aplicar nas linhas de aeronave
  document.querySelectorAll('.ac-row').forEach(row => {
    row.style.height = alturaPorLinha + 'px';
    const tds = row.querySelectorAll('td');
    tds.forEach(td => td.style.padding = paddCell);

    const cod  = row.querySelector('.ac-code');
    const tech = row.querySelector('.ac-tech');
    const woc  = row.querySelector('.wo-count');
    const wol  = row.querySelector('.wo-list');
    const pbar = row.querySelector('.prog-bar');
    const pfil = row.querySelector('.prog-bar');
    const ptxt = row.querySelector('.prog-txt');
    const arrow = row.querySelector('.arrow');

    if(cod)  cod.style.fontSize  = fontCodigo;
    if(tech) tech.style.fontSize = fontTecnico;
    if(woc)  woc.style.fontSize  = fontWo;
    if(wol)  wol.style.fontSize  = fontTecnico;
    if(ptxt) ptxt.style.fontSize = fontPct;
    if(arrow) arrow.style.fontSize = Math.min(14, Math.max(9, Math.round(10 * escala))) + 'px';

    if(pbar){
      pbar.style.width  = barraLarg;
      pbar.style.height = barraAlt;
    }

    // Badges e MTL também escalam
    row.querySelectorAll('.badge,.mtl').forEach(b => {
      b.style.fontSize = Math.min(13, Math.max(9, Math.round(10 * escala))) + 'px';
      b.style.padding  = escala > 1.5 ? '4px 12px' : '3px 9px';
    });
  });

  // Cabeçalho da tabela também escala levemente
  document.querySelectorAll('.tbl th').forEach(th => {
    th.style.fontSize = Math.min(12, Math.max(9, Math.round(10 * escala))) + 'px';
    th.style.padding  = Math.min(14, Math.max(8, Math.round(10 * escala))) + 'px 14px';
  });
}

// ─── LOAD SCRIPT LAZY ──────────────────────────────────────
function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');
    s.src=src;s.onload=res;s.onerror=()=>rej(new Error('Falha ao carregar: '+src));
    document.head.appendChild(s);
  });
}

// ─── PARSER PDF PERNOITE ───────────────────────────────────
async function extrairLinhasPDF(file){
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
  const pdfjsLib=window['pdfjs-dist/build/pdf'];
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const linhas=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const items=tc.items.map(i=>({t:i.str.trim(),x:Math.round(i.transform[4]),y:Math.round(i.transform[5])})).filter(i=>i.t);
    // Agrupar por Y (linhas com ±3px)
    const grupos=[];
    items.sort((a,b)=>b.y-a.y||a.x-b.x);
    items.forEach(item=>{
      const g=grupos.find(g=>Math.abs(g.y-item.y)<=3);
      if(g){g.items.push(item);}
      else grupos.push({y:item.y,items:[item]});
    });
    grupos.forEach(g=>{
      const txt=g.items.sort((a,b)=>a.x-b.x).map(i=>i.t).join(' ').trim();
      if(txt)linhas.push(txt);
    });
  }
  return linhas;
}

function parsePDFPernoite(linhas){
  const map={};
  const reAC=/^P[RS]-[A-Z0-9]{2,4}$/;
  const PRIOS=['IMPRET','ALTA','ROTINA','NRC','MEL'];

  linhas.forEach(linha=>{
    const tokens=linha.trim().split(/\s+/);
    if(!tokens.length||!reAC.test(tokens[0]))return;
    const ac=tokens[0];
    const resto=tokens.slice(1);
    const restoStr=resto.join(' ');

    // Linha cabeçalho — contém "PRIORIDADE T H" e "COD"
    if(restoStr.includes('PRIORIDADE')&&restoStr.includes('COD')){
      const pIdx=restoStr.indexOf('PRIORIDADE');
      const tecnico=restoStr.slice(0,pIdx).trim()||'—';
      if(!map[ac])map[ac]={code:ac,technician:tecnico,tasks:[]};
      else map[ac].technician=tecnico;
      return;
    }

    // Linha de tarefa — segundo token deve ser WO (5-7 dígitos)
    const wo=resto[0];
    if(!/^\d{5,7}$/.test(wo))return;

    // Extrair task_code: token(s) logo após WO antes da descrição
    // Prefixo curto puro (MEL, GMM, HM) → task_code = prefixo + próximo token
    // Caso contrário → primeiro token é o task_code
    let taskCode='',descStart=1;
    const t1=resto[1]||'',t2=resto[2]||'';
    if(/^[A-Z]{2,4}$/.test(t1)&&!/\d/.test(t1)&&!PRIOS.includes(t1)){
      taskCode=t2?`${t1} ${t2}`:t1; descStart=3;
    } else if(t1){ taskCode=t1; descStart=2; }

    // Encontrar prioridade para separar descrição dos números finais
    let prioIdx=-1,prio='';
    for(let i=descStart;i<resto.length;i++){
      if(PRIOS.includes(resto[i])){prioIdx=i;prio=resto[i];break;}
    }

    let desc;
    if(prioIdx>descStart){
      desc=resto.slice(descStart,prioIdx).join(' ');
    } else {
      const numIdx=resto.findIndex((t,i)=>i>=descStart&&/^\d+([,.]?\d*)$/.test(t));
      desc=numIdx>=descStart?resto.slice(descStart,numIdx).join(' '):resto.slice(descStart).join(' ');
    }

    if(!map[ac])map[ac]={code:ac,technician:'—',tasks:[]};
    map[ac].tasks.push({wo_number:wo,task_code:taskCode,description:desc.trim(),priority:prio});
  });

  return Object.values(map);
}

// ─── IMPORTAR EXCEL OU PDF ──────────────────────────────────
async function importar(ev){
  const file=ev.target.files[0];if(!file)return;
  const isPDF=file.name.toLowerCase().endsWith('.pdf');
  document.getElementById('tbody').innerHTML=`<tr><td colspan="7"><div class="loading"><div class="spinner"></div><p>Importando ${isPDF?'PDF':'planilha'}...</p></div></td></tr>`;
  try{
    let acMap={};
    if(isPDF){
      const linhas=await extrairLinhasPDF(file);
      parsePDFPernoite(linhas).forEach(ac=>{acMap[ac.code]=ac;});
    } else {
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
      const reAC=/^[A-Z]{2}-[A-Z0-9]{2,4}$/;
      let tecnicoAtual='Não atribuído';
      rows.forEach(row=>{
        const col0=String(row[0]||'').trim();
        const col1=String(row[1]||'').trim();
        const col2=String(row[2]||'').trim();
        const col3=String(row[3]||'').trim();
        if(!reAC.test(col0))return;
        const isHeader=col3.toUpperCase()==='PRIORIDADE'||col1.toUpperCase().includes('BOX')||col1.includes('|');
        if(isHeader){
          // Validar técnico: não pode conter datas, '|', 'BOX', ou ser só números
          const tecValido=col2&&
            col2.toUpperCase()!=='PRIORIDADE'&&
            !col2.includes('|')&&
            !col2.toUpperCase().includes('BOX')&&
            !/^\d/.test(col2.trim())&&
            col2.trim().length>1;
          if(tecValido)tecnicoAtual=col2.trim();
          if(!acMap[col0])acMap[col0]={code:col0,technician:tecnicoAtual,tasks:[]};
          else acMap[col0].technician=tecnicoAtual;
          return;
        }
        const wo=col1;const desc=col2;if(!wo)return;
        const prio=col3;
        const descCompleta=prio&&prio!==desc?`[${prio}] ${desc}`:desc;
        if(!acMap[col0])acMap[col0]={code:col0,technician:tecnicoAtual,tasks:[]};
        acMap[col0].tasks.push({wo_number:wo,description:descCompleta});
      });
    }
    await sb.from('tasks').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('aircrafts').delete().neq('id','00000000-0000-0000-0000-000000000000');
    const aerosFiltradas = Object.values(acMap).filter(ac=>ac.tasks.length>0);
    const aerosIgnoradas = Object.values(acMap).filter(ac=>ac.tasks.length===0).map(ac=>ac.code);
    for(const ac of aerosFiltradas){
      const{data:ins}=await sb.from('aircrafts').insert([{code:ac.code,technician:ac.technician}]).select();
      if(ins?.[0])
        await sb.from('tasks').insert(ac.tasks.map(t=>({aircraft_id:ins[0].id,wo_number:t.wo_number,task_code:t.task_code||null,description:t.description})));
    }
    await load();
    const tot=aerosFiltradas.reduce((s,a)=>s+a.tasks.length,0);
    const ignoradasMsg=aerosIgnoradas.length?`\n⚠️ Ignoradas (sem WO): ${aerosIgnoradas.join(', ')}`:'';
    alert(`✅ Importado!\n${aerosFiltradas.length} aeronaves · ${tot} tarefas${ignoradasMsg}`);
  }catch(err){console.error(err);alert('❌ Erro: '+err.message);await load();}
  ev.target.value='';
}

      });
    });

    if(abertas.length>0){
      const lista=abertas.slice(0,8).join('\n')+(abertas.length>8?`\n... e mais ${abertas.length-8} WO(s)`:'');

    } else {

    }
  }
  await salvarTurno();
}

async function salvarTurno(){
  try{
    const{data:aeros,error}=await sb.from('aircrafts')
      .select('*,tasks(*,findings(*),observations(*))').order('code');
    if(error||!aeros?.length){alert('❌ Nenhum dado para salvar.');return;}

    // Calcular totais do turno
    let tWO=0,dWO=0,fCount=0;
    aeros.forEach(ac=>{
      const tasks=ac.tasks||[];
      const wosU=[...new Set(tasks.map(t=>t.wo_number))];
      tWO+=wosU.length;
      // WO concluída = todas as tarefas da WO concluídas
      wosU.forEach(wo=>{
        const woTasks=tasks.filter(t=>t.wo_number===wo);
        if(woTasks.every(t=>t.completed||t.deferred)) dWO++;
      });
      fCount+=tasks.filter(t=>t.has_finding).length;
    });
    const pct=tWO?Math.round(dWO/tWO*100):0;
    const hoje=new Date().toISOString().split('T')[0];

    // Inserir turno
    const{data:turno,error:e2}=await sb.from('turnos').insert([{
      data_turno:hoje,
      inicio:aeros[0]?.tasks?.[0]?.started_at||new Date().toISOString(),
      encerrado_em:new Date().toISOString(),
      total_aero:aeros.length,
      total_wo:tWO,
      wo_concluidas:dWO,
      wo_pendentes:tWO-dWO,
      total_findings:fCount,
      pct_conclusao:pct
    }]).select();
    if(e2)throw e2;
    const turnoId=turno[0].id;

    // Inserir aeronaves e tasks com snapshot completo
    for(const ac of aeros){
      const tasks=ac.tasks||[];
      const wosU=[...new Set(tasks.map(t=>t.wo_number))];
      const woConcluidas=wosU.filter(wo=>tasks.filter(t=>t.wo_number===wo).every(t=>t.completed||t.deferred)).length;
      const hasFind=tasks.some(t=>t.has_finding);
      const mtlOrd=['TST','NHE','OK',null];
      const mtlVals=tasks.map(t=>t.material);
      let mtlBest=null;
      for(const m of mtlOrd){if(mtlVals.includes(m)){mtlBest=m;break;}}

      const{data:taero}=await sb.from('turno_aeronaves').insert([{
        turno_id:turnoId,
        codigo:ac.code,
        tecnico:ac.technician,
        wo_total:wosU.length,
        wo_concluidas:woConcluidas,
        wo_pendentes:wosU.length-woConcluidas,
        pct_conclusao:tasks.length?Math.round(tasks.filter(t=>t.completed).length/tasks.length*100):0,
        tem_finding:hasFind,
        mtl_critico:mtlBest
      }]).select();

      const aeroId=taero?.[0]?.id;
      if(!aeroId)continue;

      // Salvar cada task com obs e findings como JSONB
      for(const task of tasks){
        const obs=(task.observations||[])
          .sort((a,b)=>(a.recorded_at||'').localeCompare(b.recorded_at||''))
          .map(o=>({text:o.text,recorded_at:o.recorded_at,author:o.author||'Técnico'}));
        const finds=(task.findings||[])
          .map(f=>({description:f.description,resolved:f.resolved}));

        await sb.from('turno_tarefas').insert([{
          turno_id:turnoId,
          turno_aeronave_id:aeroId,
          wo_number:task.wo_number,
          task_code:task.task_code||null,
          descricao:task.description,
          concluida:task.completed||false,
          has_finding:task.has_finding||false,
          has_iio:task.has_iio||false,
          has_runap:task.has_runap||false,
          deferida:task.deferred||false,
          defer_reason:task.defer_reason||null,
          material:task.material,
          iniciada_em:task.started_at,
          concluida_em:task.completed_at,
          observacoes:obs,
          findings:finds
        }]);
      }
    }

    // Só limpa se chegou até aqui sem erros
    await sb.from('observations').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('findings').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('tasks').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('aircrafts').delete().neq('id','00000000-0000-0000-0000-000000000000');
    openPanels.clear();
    await load();
    if(confirm('✅ Turno encerrado e salvo no histórico!\n\nAbrir página de histórico agora?')){
      window.open('historico.html','_blank');
    }
  }catch(err){
    alert('❌ Erro ao salvar turno: '+err.message+'\n\nOs dados NÃO foram apagados. Tente novamente.');
  }
}

let somAtivo = true;
let findingsConhecidos = new Set();
let primeiroLoad = true;

function toggleSom(){
  somAtivo = !somAtivo;
  const btn = document.getElementById('btn-som');
  btn.textContent = somAtivo ? '🔔 Som ON' : '🔕 Som OFF';
  btn.style.color = somAtivo ? '#94a3b8' : '#475569';

function tocarAlerta(){
  if(!somAtivo) return;
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // 3 bipes urgentes
    [0, 0.35, 0.7].forEach(offset => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + offset);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + offset + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + offset + 0.28);
      osc.start(ctx.currentTime + offset);
      osc.stop(ctx.currentTime + offset + 0.3);
    });
  }catch(e){}
}

function verificarNovosFindings(data){
  if(primeiroLoad){
    data.forEach(ac=>(ac.tasks||[]).forEach(t=>{
      if(t.has_finding||(t.findings||[]).some(f=>!f.resolved))
        findingsConhecidos.add(t.id+'-find');
      if(t.has_iio)   findingsConhecidos.add(t.id+'-iio');
      if(t.has_runap) findingsConhecidos.add(t.id+'-runap');
    }));
    primeiroLoad = false;
    return;
  }
  let novo = false;
  data.forEach(ac=>(ac.tasks||[]).forEach(t=>{
    const temFind = t.has_finding||(t.findings||[]).some(f=>!f.resolved);
    if(temFind && !findingsConhecidos.has(t.id+'-find')){
      findingsConhecidos.add(t.id+'-find'); novo = true;
    }
    if(!temFind) findingsConhecidos.delete(t.id+'-find');

    if(t.has_iio && !findingsConhecidos.has(t.id+'-iio')){
      findingsConhecidos.add(t.id+'-iio'); novo = true;
    }
    if(!t.has_iio) findingsConhecidos.delete(t.id+'-iio');

    if(t.has_runap && !findingsConhecidos.has(t.id+'-runap')){
      findingsConhecidos.add(t.id+'-runap'); novo = true;
    }
    if(!t.has_runap) findingsConhecidos.delete(t.id+'-runap');
  }));
  if(novo) tocarAlerta();
}

  .on('postgres_changes',{event:'*',schema:'public',table:'findings'},load)
  .on('postgres_changes',{event:'*',schema:'public',table:'observations'},load)
  .subscribe(s=>{
    setConn(s==='SUBSCRIBED');
    realtimeOk = (s==='SUBSCRIBED');
  });

// Polling inteligente: só ativa se realtime estiver offline
let realtimeOk = false;
setInterval(()=>{ if(!realtimeOk) load(); }, 15000);

// Recarregar ao voltar para a aba
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible') load();
});

load();
</script>
